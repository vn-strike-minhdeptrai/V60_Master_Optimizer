<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V60 Master Optimizer</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { background: linear-gradient(135deg, #1a1a2e, #16213e); color: #fff; }
  .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); }
  .btn-glass { transition: all 0.2s; }
  .btn-glass:hover { transform: translateY(-2px); box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
  .anime-bg { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://picsum.photos/id/1011/800/1200'); background-size: cover; background-position: center; }
</style>
</head>
<body class="min-h-screen p-4">
<div class="max-w-md mx-auto">
  <!-- Header -->
  <div class="flex justify-between items-center mb-4">
    <div>
      <h1 class="text-3xl font-bold text-white">minhdẹp trai</h1>
      <p class="text-sm text-gray-400">V60 Master Optimizer v2.0</p>
    </div>
    <div class="text-right text-xs">
      <div>16:23</div>
      <div class="flex items-center gap-1">
        <span>4G</span> <span>51%</span>
      </div>
    </div>
  </div>

  <!-- Status -->
  <div class="glass rounded-3xl p-4 mb-6">
    <div class="flex items-center gap-3">
      <div class="w-3 h-3 bg-green-400 rounded-full animate-pulse"></div>
      <div>
        <div class="text-sm text-gray-300">Trạng thái</div>
        <div class="font-semibold">Sẵn sàng - Balanced</div>
      </div>
    </div>
  </div>

  <!-- Control Panel -->
  <div class="mb-4">
    <h2 class="text-xl font-semibold mb-3 px-1">Bảng Điều Khiển Module</h2>
    
    <!-- Profile Buttons -->
    <div class="space-y-3">
      <!-- Gaming -->
      <button onclick="switchProfile('game')" 
              class="btn-glass w-full glass rounded-3xl p-5 flex items-center gap-4 text-left hover:bg-red-500/10">
        <div class="text-4xl">🔥</div>
        <div class="flex-1">
          <div class="font-bold text-xl text-red-400">Chế độ Gaming</div>
          <div class="text-sm text-gray-400">Hiệu năng cao + mát khi chơi</div>
        </div>
      </button>

      <!-- Battery Saver -->
      <button onclick="switchProfile('battery')" 
              class="btn-glass w-full glass rounded-3xl p-5 flex items-center gap-4 text-left hover:bg-green-500/10">
        <div class="text-4xl">🌿</div>
        <div class="flex-1">
          <div class="font-bold text-xl text-green-400">Chế độ Tiết kiệm</div>
          <div class="text-sm text-gray-400">Pin trâu, ít tiến trình ngầm</div>
        </div>
      </button>

      <!-- QC Block -->
      <button onclick="toggleQC()" 
              class="btn-glass w-full glass rounded-3xl p-5 flex items-center gap-4 text-left">
        <div class="text-4xl">🛡️</div>
        <div class="flex-1">
          <div class="font-bold text-xl">Bật/Tắt Chặn QC</div>
          <div class="text-sm text-gray-400">Chặn quảng cáo và tracking</div>
        </div>
      </button>

      <!-- Clean RAM -->
      <button onclick="cleanRAM()" 
              class="btn-glass w-full glass rounded-3xl p-5 flex items-center gap-4 text-left">
        <div class="text-4xl">🚀</div>
        <div class="flex-1">
          <div class="font-bold text-xl">Dọn Rác RAM</div>
          <div class="text-sm text-gray-400">Giải phóng bộ nhớ, làm mượt</div>
        </div>
      </button>
    </div>
  </div>

  <div class="text-center text-xs text-gray-500 mt-6">
    LG V60 • APatch • Minh + Grok • 2026
  </div>
</div>

<script>
function switchProfile(profile) {
  alert('Switching to ' + profile + ' profile... (Full integration coming in next update)');
  // TODO: Call shell script via WebUI or Termux
  console.log('Profile switched to:', profile);
}

function toggleQC() {
  alert('Chặn QC toggled (feature in development)');
}

function cleanRAM() {
  alert('RAM cleaned! (will integrate with script)') ;
}
</script>
</body>
</html>
